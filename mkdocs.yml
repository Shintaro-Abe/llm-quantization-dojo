site_name: LLM量子化道場
site_description: 初学者AIエンジニアのためのLLM量子化 実践学習ツール
site_author: llm-quantization-dojo
# repo_url / site_url はリポジトリ確定後に設定する

# 公開座学は learn/ 配下（docs/ はガバナンス文書のため公開対象外）
docs_dir: learn

theme:
  name: material
  language: ja
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - content.code.copy
    - content.code.annotate
    - toc.follow
    - search.suggest
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: ダークモードに切り替え
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: ライトモードに切り替え

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details

nav:
  - ホーム: index.md
